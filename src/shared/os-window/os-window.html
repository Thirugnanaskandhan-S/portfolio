<div
  #win
  class="os-window"
  [class.os-window--maximized]="maximized()"
  [class.os-window--has-pixel-pos]="positionReady() && !maximized()"
  [class.os-window--title-drag]="titleDragging()"
  [style.left.px]="winLeftPx()"
  [style.top.px]="winTopPx()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="osw-title"
>
  <app-window-chrome
    [title]="title()"
    [titleIcon]="titleIcon()"
    [subheader]="subheader()"
    [maximized]="maximized()"
    (windowClose)="windowClose.emit()"
    (windowMinimize)="windowMinimize.emit()"
    (windowToggleMax)="windowToggleMax.emit()"
    (titleBarDblClick)="onTitleBarDblClick($event)"
    (titleBarPointerDown)="onTitleBarPointerDown($event)"
  >
    <ng-content select="[appWindowSubheader]" />
  </app-window-chrome>
  <div class="os-window__body">
    @if (useIframe()) {
      <iframe
        class="os-window__frame"
        [src]="safeSrc()"
        title="Document viewer"
      ></iframe>
    } @else {
      <div class="os-window__projection">
        <ng-content />
      </div>
    }
  </div>
</div>
