<div class="desktop">
  <div class="desktop-backdrop" #backdrop role="presentation" aria-hidden="true">
    <div class="desktop-wallpaper-layer desktop-wallpaper-layer--base" [style.background-image]="baseWallpaper()"></div>
    @if (revealWallpaper(); as reveal) {
      <div
        class="desktop-wallpaper-layer desktop-wallpaper-layer--reveal"
        [class.desktop-wallpaper-layer--reveal-open]="revealExpand()"
        [style.background-image]="reveal"
        [style.--reveal-x.%]="revealOriginXPct()"
        [style.--reveal-y.%]="revealOriginYPct()"
        (transitionend)="onWallpaperRevealEnd($event)"
      ></div>
    }
  </div>
  <div class="desktop-surface" #surface>
    <div class="desktop-icons" (pointerdown)="onDesktopIconsPointerDown($event)">
      @if (marqueeBox(); as mq) {
        <div
          class="desktop-marquee"
          [style.left.px]="mq.left"
          [style.top.px]="mq.top"
          [style.width.px]="mq.width"
          [style.height.px]="mq.height"
        ></div>
      }
      @for (v of variants; track v) {
        <div
          class="desktop-icon-slot"
          [attr.data-desktop-variant]="v"
          [class.desktop-icon-slot--ghosting]="draggingVariants().includes(v)"
          [style.left.px]="iconLeft(v)"
          [style.top.px]="iconTop(v)"
          (mousedown)="$event.stopPropagation()"
          (pointerdown)="onIconPointerDown(v, $event)"
          (dblclick)="onSlotDblClick(v, $event)"
        >
          <app-desktop-icon
            [variant]="v"
            [label]="labels[v]"
            [selected]="selectedVariants().includes(v)"
            (selectedChange)="onKeyboardSelect(v)"
          />
        </div>
      }
    </div>
  </div>

  @if (thisPcWindow().open && !thisPcWindow().minimized) {
    <app-os-window
      [title]="thisPcDisplayTitle()"
      [titleIcon]="thisPcTitleIcon()"
      [subheader]="true"
      [useIframe]="false"
      [maximized]="thisPcWindow().maximized"
      (windowClose)="closeThisPcWindow()"
      (windowMinimize)="minimizeThisPcWindow()"
      (windowToggleMax)="toggleThisPcMaximize()"
    >
      <app-explorer-command-bar
        appWindowSubheader
        [addressText]="thisPcExplorerAddressText()"
        [navigateUpEnabled]="thisPcMainView() !== 'root'"
        [searchQuery]="thisPcSearchQuery()"
        (searchQueryChange)="thisPcSearchQuery.set($event)"
        (retryClick)="onThisPcRefreshClick()"
        (upClick)="onThisPcNavigateUp()"
      />
      <app-this-pc
        [mainView]="thisPcMainView()"
        [searchQuery]="thisPcSearchQuery()"
        [listRefreshFlash]="thisPcListRefreshFlash()"
        (folderEnter)="onThisPcFolderEnter($event)"
        (navigateToRoot)="onThisPcNavigateToRoot()"
        (desktopShortcutOpen)="onThisPcDesktopShortcut($event)"
        (myProjectsPdfOpen)="onMyProjectsPdfOpen($event)"
      />
    </app-os-window>
  }
  @if (resumeWindow().open && !resumeWindow().minimized) {
    <app-os-window
      [title]="pdfViewerTitle"
      [src]="pdfViewerSrc()"
      [maximized]="resumeWindow().maximized"
      (windowClose)="closeResumeWindow()"
      (windowMinimize)="minimizeResumeWindow()"
      (windowToggleMax)="toggleResumeMaximize()"
    />
  }
  <app-start-menu [open]="startMenuOpen()" (close)="onStartMenuClose()" />
  <app-taskbar
    [tasks]="taskbarTasks()"
    (taskActivate)="onTaskbarTaskActivate($event)"
    (startActivate)="onTaskbarStartClick()"
    (darkModeChange)="onDarkModeChange($event)"
  />
</div>
